<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Top arc path for "TERESA FURR" -->
    <path id="topArc" d="M 30,100 A 70,70 0 0,1 170,100" />
    <!-- Bottom arc path for "TAXFLOW" -->
    <path id="bottomArc" d="M 40,115 A 65,65 0 0,0 160,115" />
  </defs>

  <!-- Outer circle ring -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="white" stroke-width="2.5" opacity="0.9"/>
  <!-- Inner circle ring -->
  <circle cx="100" cy="100" r="78" fill="none" stroke="white" stroke-width="1" opacity="0.4"/>

  <!-- Top arc text: TERESA FURR -->
  <text font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="4" fill="white" opacity="0.95">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">TERESA FURR</textPath>
  </text>

  <!-- Center script text: SmartBooks -->
  <text
    x="100"
    y="108"
    font-family="'Georgia', 'Times New Roman', serif"
    font-size="28"
    font-style="italic"
    font-weight="700"
    fill="white"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="-0.5"
  >SmartBooks</text>

  <!-- Bottom arc text: TAXFLOW -->
  <text font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="5" fill="white" opacity="0.95">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">TAXFLOW</textPath>
  </text>

  <!-- Small decorative dots on sides -->
  <circle cx="24" cy="100" r="2.5" fill="white" opacity="0.6"/>
  <circle cx="176" cy="100" r="2.5" fill="white" opacity="0.6"/>
</svg>
